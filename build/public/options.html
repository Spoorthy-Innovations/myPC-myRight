<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>myPC myRight - Exclusions</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      max-width: 760px;
      margin: 24px auto;
      padding: 0 16px;
      color: #222;
      line-height: 1.4;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }
    .hint {
      color: #666;
      margin: 0 0 14px 0;
      font-size: 13px;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      font: 13px/1.4 Consolas, 'Courier New', monospace;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    button {
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    button.primary {
      background: #0b57d0;
      border-color: #0b57d0;
      color: #fff;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #2d6a4f;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Website Exclusions</h1>
  <p class="hint">
    One host pattern per line. Supported: exact host (`docs.google.com`) or wildcard subdomain (`*.officeapps.live.com`).
    The extension is fully disabled on excluded hosts. Reload affected tabs after saving.
  </p>
  <textarea id="excludedHosts"></textarea>
  <div class="actions">
    <button id="resetDefault">Reset defaults</button>
    <button id="saveBtn" class="primary">Save exclusions</button>
  </div>
  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      color: #1a1a2e;
    }
    p {
      font-size: 13px;
      color: #555;
      margin: 0;
      line-height: 1.4;
    }
    .badge {
      display: inline-block;
      background: #4CAF50;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Fpaste by Spoorthy</h1>
  <p>Paste and copy are allowed on this site. Use Ctrl+V (or Cmd+V) to paste anywhere, even when the site tries to block it.</p>
  <span class="badge">Active</span>
</body>
</html>
